<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjeta digital — Arhez Card | Arhez Tech</title>
  <meta name="description"
    content="Consulta tu tarjeta digital de negocio: contacto WhatsApp, redes sociales y ubicación. Creado con Arhez Card de Arhez Tech (México).">
  <meta name="robots" content="index, follow, max-image-preview:large">

  <meta property="og:type" content="website">
  <meta property="og:locale" content="es_MX">

  <meta property="og:title" content="Tarjeta digital — Arhez Card">
  <meta property="og:description"
    content="Vista pública de una tarjeta de presentación digital: enlaces útiles para contactar tu negocio.">
  <meta property="og:image" content="https://arhez-tech.com/assets/img/logotipo.png">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Tarjeta digital — Arhez Card | Arhez Tech">

    content="Tarjeta de negocio digital con WhatsApp y redes sociales.">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root {
      --bg-gray: #F5F5F7;
      --accent-green: #8DEE12;
      --text-dark: #1D1D1F;
      --text-gray: #86868B;
      --glass-border: rgba(0, 0, 0, 0.08);
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gray);
      color: var(--text-dark);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    #card-container {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      background: #fff;
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 40px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.05);
      position: relative;
    }

    @media (max-width: 600px) {
      #card-container {
        max-width: 100%;
        box-shadow: none;
      }
    }

    .card-logo-wrap {
      margin-bottom: 32px;
      text-align: center;
    }

    .logo-ring {
      width: 110px; height: 110px;
      border-radius: 50%;
      border: 2px solid var(--accent-green);
      padding: 6px;
      display: flex; align-items: center; justify-content: center;
    }

    .logo-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: #f0f0f0;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-size: 2.5rem; font-weight: 900;
      color: var(--accent-green);
    }

    .logo-inner img { width: 100%; height: 100%; object-fit: contain; }

    .card-biz-name {
      font-size: 2rem; font-weight: 800;
      text-align: center; margin-bottom: 6px;
    }

    .card-tagline {
      font-size: 1rem; color: var(--text-gray);
      text-align: center; margin-bottom: 40px;
    }

    .card-details {
      width: 100%; background: var(--bg-gray);
      border-radius: 20px; padding: 24px;
      margin-bottom: 32px;
    }

    .card-desc {
      font-size: 0.95rem; line-height: 1.6;
      text-align: center;
    }

    .card-socials {
      width: 100%; display: flex; flex-direction: column; gap: 14px;
    }

    .card-social-btn {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; border-radius: 18px;
      background: #fff;
      border: 1px solid var(--glass-border);
      color: inherit; text-decoration: none;
      transition: all var(--transition);
    }

    .card-social-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    
    .icon-box {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; color: #fff;
    }

    .btn-info { flex: 1; }
    .btn-label { display: block; font-size: 0.7rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn-value { display: block; font-size: 1rem; font-weight: 600; }

    .card-brand {
      margin-top: auto; padding: 60px 0 20px;
      font-size: 0.7rem; font-weight: 700; opacity: 0.3;
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* Loader */
    .loader-wrap {
      position: fixed; inset: 0; background: var(--bg-gray);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .loader {
      width: 48px; height: 48px; border: 4px solid var(--glass-border);
      border-top-color: var(--accent-green); border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-msg { display: none; text-align: center; padding: 40px; }
  </style>
</head>
<body>

  <div id="loader" class="loader-wrap"><div class="loader"></div></div>
  
  <div id="error-msg">
    <i class="fas fa-exclamation-circle fa-4x" style="color: #ef4444; margin-bottom: 24px;"></i>
    <h2>Tarjeta No Encontrada</h2>
    <p style="color: var(--text-gray); margin-bottom: 32px;">El enlace es inválido o la tarjeta ha sido eliminada.</p>
    <a href="tarjeta-digital.html" style="color: var(--accent-green); text-decoration: none; font-weight: 700;">Crear mi propia tarjeta →</a>
  </div>

  <div id="card-container">
    <div class="card-logo-wrap">
      <div class="logo-ring" id="logoRing">
        <div class="logo-inner" id="logoInner">
          <img id="logoImg" style="display:none;">
          <span id="logoInitials">?</span>
        </div>
      </div>
    </div>

    <h1 class="card-biz-name" id="bizName"></h1>
    <p class="card-tagline" id="bizTagline"></p>

    <div class="card-details" id="detailsBox" style="display:none;">
      <p class="card-desc" id="bizDesc" style="margin-bottom: 12px;"></p>
      <div id="hoursWrap" style="display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem; font-weight: 700; color: var(--accent-green);">
        <i class="fas fa-clock"></i> <span id="bizHours"></span>
      </div>
    </div>

    <div class="card-socials">
      <a class="card-social-btn" id="link-wa" style="display:none;" target="_blank">
        <div class="icon-box" style="background: #25D366;"><i class="fab fa-whatsapp"></i></div>
        <div class="btn-info"><span class="btn-label">WhatsApp</span><span class="btn-value">Contactar</span></div>
        <i class="fas fa-chevron-right" style="opacity:0.2;"></i>
      </a>
      <a class="card-social-btn" id="link-fb" style="display:none;" target="_blank">
        <div class="icon-box" style="background: #1877F2;"><i class="fab fa-facebook-f"></i></div>
        <div class="btn-info"><span class="btn-label">Facebook</span><span class="btn-value">Ver Perfil</span></div>
        <i class="fas fa-chevron-right" style="opacity:0.2;"></i>
      </a>
      <a class="card-social-btn" id="link-ig" style="display:none;" target="_blank">
        <div class="icon-box" style="background: linear-gradient(45deg, #f09433, #e1306c, #bc1888);"><i class="fab fa-instagram"></i></div>
        <div class="btn-info"><span class="btn-label">Instagram</span><span class="btn-value">Seguir</span></div>
        <i class="fas fa-chevron-right" style="opacity:0.2;"></i>
      </a>
      <a class="card-social-btn" id="link-web" style="display:none;" target="_blank">
        <div class="icon-box" style="background: var(--text-dark);"><i class="fas fa-globe"></i></div>
        <div class="btn-info"><span class="btn-label" id="lbl-web">Sitio Web</span><span class="btn-value">Visitar</span></div>
        <i class="fas fa-chevron-right" style="opacity:0.2;"></i>
      </a>
      <a class="card-social-btn" id="link-address" style="display:none;" target="_blank">
        <div class="icon-box" style="background: #ef4444;"><i class="fas fa-map-marker-alt"></i></div>
        <div class="btn-info"><span class="btn-label">Ubicación</span><span class="btn-value">Google Maps</span></div>
        <i class="fas fa-chevron-right" style="opacity:0.2;"></i>
      </a>
    </div>

    <div class="card-brand">Arhez Tech · Arhez Card</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wrjqbyntrjepvkrtautz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyanFieW50cmplcHZrcnRhdXR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMDQwMzUsImV4cCI6MjA4OTc4MDAzNX0.fd85s25NKWphVG0B6U_p3mog4q7R6ni0nWT1JUviLL0';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadCard() {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('id');
      
      if (!slug) { showError(); return; }

      const { data, error } = await supabaseClient
        .from('digital_cards')
        .select('card_data')
        .eq('slug', slug)
        .single();

      if (error || !data) { showError(); return; }

      renderCard(data.card_data);
    }

    function renderCard(d) {
      document.title = d.bizName + " — Arhez Card";
      
      const container = document.getElementById('card-container');
      container.style.backgroundColor = d.colorBg || '#fff';
      container.style.color = d.colorText || '#1D1D1F';
      
      document.getElementById('logoRing').style.borderColor = d.colorAccent || '#8DEE12';
      document.getElementById('logoInitials').style.color = d.colorAccent || '#8DEE12';

      document.getElementById('bizName').textContent = d.bizName;
      document.getElementById('bizTagline').textContent = d.bizTagline || '';
      
      if (d.bizDesc || d.bizHours) {
        document.getElementById('detailsBox').style.display = 'block';
        if (d.bizDesc) {
          document.getElementById('bizDesc').textContent = d.bizDesc;
          document.getElementById('bizDesc').style.display = 'block';
        } else {
          document.getElementById('bizDesc').style.display = 'none';
        }
        
        if (d.bizHours) {
          document.getElementById('bizHours').textContent = d.bizHours;
          document.getElementById('hoursWrap').style.display = 'flex';
        } else {
          document.getElementById('hoursWrap').style.display = 'none';
        }
      }

      if (d.logoDataUrl) {
        const img = document.getElementById('logoImg');
        img.src = d.logoDataUrl;
        img.style.display = 'block';
        document.getElementById('logoInitials').style.display = 'none';
      } else {
        document.getElementById('logoInitials').textContent = d.bizName.charAt(0).toUpperCase();
      }

      // Links
      if (d.waNumber) {
        const btn = document.getElementById('link-wa');
        btn.style.display = 'flex';
        btn.href = `https://wa.me/${d.waNumber.replace(/\D/g,'')}`;
      }
      if (d.fbUrl) {
        const btn = document.getElementById('link-fb');
        btn.style.display = 'flex';
        btn.href = d.fbUrl.startsWith('http') ? d.fbUrl : `https://facebook.com/${d.fbUrl.replace('@','')}`;
      }
      if (d.igUrl) {
        const btn = document.getElementById('link-ig');
        btn.style.display = 'flex';
        btn.href = d.igUrl.startsWith('http') ? d.igUrl : `https://instagram.com/${d.igUrl.replace('@','')}`;
      }
      if (d.webUrl) {
        const btn = document.getElementById('link-web');
        btn.style.display = 'flex';
        btn.href = d.webUrl;
        document.getElementById('lbl-web').textContent = d.webLabel || 'Sitio Web';
      }
      if (d.bizAddress) {
        const btn = document.getElementById('link-address');
        btn.style.display = 'flex';
        btn.href = `https://www.google.com/maps?q=${encodeURIComponent(d.bizAddress)}`;
      }

      document.getElementById('loader').style.display = 'none';
      container.style.display = 'flex';
    }

    function showError() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    }

    loadCard();
  </script>
</body>
</html>
