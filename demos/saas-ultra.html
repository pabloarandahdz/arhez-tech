<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title id="page-title">Arhez SaaS Ultra</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --saas-primary: #111827; /* Dark Gray / Black for layout */
            --saas-surface: #1f2937;
            --saas-bg: #f3f4f6; /* Dashboard grayish background */
            --saas-text: #374151;
            --saas-accent: #3b82f6; /* Dynamic accent, default blue */
            --saas-sidebar-width: 250px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--saas-bg);
            color: var(--saas-text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* --- Sidebar --- */
        .sidebar {
            width: var(--saas-sidebar-width);
            background-color: var(--saas-primary);
            color: white;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        
        .sidebar-brand {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-weight: 800;
            font-size: 1.25rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: white;
            text-decoration: none;
        }
        
        .sidebar-brand i { color: var(--saas-accent); margin-right: 12px; font-size: 1.5rem; }

        .sidebar-menu {
            flex-grow: 1;
            padding: 20px 0;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .menu-item i { width: 20px; margin-right: 12px; font-size: 1.1rem; text-align: center; }

        .menu-item:hover, .menu-item.active {
            color: white;
            background: rgba(255,255,255,0.05);
            border-left-color: var(--saas-accent);
        }
        
        .menu-item.active i { color: var(--saas-accent); }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        /* --- Main Content --- */
        .main-wrapper {
            margin-left: var(--saas-sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Topbar */
        .topbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .topbar-search {
            position: relative;
            width: 300px;
        }
        
        .topbar-search input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 50px;
            padding: 8px 15px 8px 35px;
            font-size: 0.9rem;
            background: #f9fafb;
            transition: background 0.2s;
            outline: none;
        }
        .topbar-search input:focus { background: white; border-color: var(--saas-accent); }
        .topbar-search i { position: absolute; left: 12px; top: 12px; color: #9ca3af; }

        .topbar-actions { display: flex; align-items: center; gap: 20px; }
        .topbar-actions .icon-btn {
            background: none; border: none; font-size: 1.2rem; color: #6b7280;
            position: relative; cursor: pointer; transition: color 0.2s;
        }
        .topbar-actions .icon-btn:hover { color: var(--saas-primary); }
        .topbar-actions .icon-btn .badge {
            position: absolute; top: -5px; right: -5px; background: #ef4444; width: 16px; height: 16px;
            border-radius: 50%; font-size: 0.6rem; display: flex; align-items: center; justify-content: center;
        }

        .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--saas-accent); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }

        /* Dashboard Content */
        .content-area { padding: 30px; flex-grow: 1; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-header h1 { font-size: 1.5rem; font-weight: 700; margin: 0; color: #111827; }

        /* KPI Cards */
        .kpi-card {
            background: white; border-radius: 16px; padding: 24px;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            display: flex; align-items: center; gap: 20px; height: 100%;
        }
        .kpi-icon {
            width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            font-size: 1.4rem; background: rgba(59, 130, 246, 0.1); color: var(--saas-accent);
        }
        .kpi-info { overflow: hidden; }
        .kpi-info p { 
            margin: 0; font-size: 0.85rem; color: #6b7280; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .kpi-info h3 { margin: 5px 0 0 0; font-size: 1.6rem; font-weight: 800; color: #111827; }

        /* Chart Area Mock */
        .chart-box {
            background: white; border-radius: 16px; padding: 24px;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            height: 350px; display: flex; flex-direction: column;
        }
        .chart-mock {
            flex-grow: 1; margin-top: 15px; position: relative;
            background: repeating-linear-gradient(0deg, transparent, transparent 39px, #f3f4f6 39px, #f3f4f6 40px);
            display: flex; align-items: flex-end; justify-content: space-around; padding-bottom: 1px;
        }
        .bar { width: 8%; background: var(--saas-accent); border-radius: 4px 4px 0 0; opacity: 0.8; transition: opacity 0.2s; }
        .bar:hover { opacity: 1; }

        /* Data Table */
        .table-box {
            background: white; border-radius: 16px; padding: 24px;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-top: 30px;
        }
        .table { margin-bottom: 0; }
        .table th { border-bottom: 1px solid #e5e7eb; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; font-weight: 600; padding: 15px; }
        .table td { border-bottom: 1px solid #f3f4f6; color: #111827; font-weight: 500; font-size: 0.95rem; vertical-align: middle; padding: 15px; }
        .table tr:last-child td { border-bottom: none; }
        .status-badge { padding: 5px 12px; border-radius: 50px; font-size: 0.75rem; font-weight: 700; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-warning { background: #fef9c3; color: #854d0e; }

        .back-to-menu {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--saas-primary); color: white;
            padding: 12px 24px; border-radius: 50px; font-weight: 700;
            text-decoration: none; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 2000; display: flex; align-items: center; border: 2px solid rgba(255,255,255,0.1);
        }
        .back-to-menu:hover { background: var(--saas-accent); color: white; }

        /* Generics */
        .btn-brand {
            background: var(--saas-accent); color: white; border: none; padding: 8px 20px;
            border-radius: 8px; font-weight: 600; transition: background 0.2s;
        }
        .btn-brand:hover { filter: brightness(1.1); color: white; }

        @media (max-width: 992px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
            .main-wrapper { margin-left: 0; }
            .topbar-search { display: none; }
        }
        
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 999;
            display: none; opacity: 0; transition: opacity 0.3s;
        }
        .sidebar-overlay.show {
            display: block; opacity: 1;
        }
    </style>
</head>
<body>

    <a href="../index.html#demos" class="back-to-menu"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión (Volver al menú)</a>

    <!-- Overlay for mobile click-off -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <a href="#" class="sidebar-brand">
            <i id="brand-icon" class="fas fa-cube"></i> <span id="brand-title">Arhez SaaS</span>
        </a>
        <div class="sidebar-menu" id="menu-container">
            <!-- Dynamic Menu injected via JS -->
        </div>
        <div class="sidebar-footer">
            <div class="d-flex align-items-center">
                <div class="user-avatar" style="width: 40px; height: 40px;">JS</div>
                <div class="ms-3">
                    <p class="mb-0 text-white fw-bold" style="font-size: 0.9rem;">Admin User</p>
                    <p class="mb-0" style="color: rgba(255,255,255,0.5); font-size: 0.8rem;">Superuser</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <header class="topbar">
            <!-- Hamburger for Mobile (Mock) -->
            <button id="mobile-menu-btn" class="bg-transparent border-0 d-lg-none fs-4" style="color: var(--saas-text);"><i class="fas fa-bars"></i></button>
            
            <div class="topbar-search d-none d-lg-block">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar registros, clientes o datos...">
            </div>
            
            <div class="topbar-actions">
                <button class="icon-btn"><i class="far fa-bell"></i><span class="badge">3</span></button>
                <button class="icon-btn"><i class="far fa-envelope"></i></button>
                <div class="user-avatar" style="cursor: pointer;">JS</div>
            </div>
        </header>

        <main class="content-area">
            <div class="page-header">
                <div>
                    <h1 id="dashboard-title">Panel General</h1>
                    <p class="text-muted mb-0" style="font-size: 0.9rem;">Visión integral de operaciones en tiempo real</p>
                </div>
                <div>
                    <button class="btn-brand"><i class="fas fa-download me-2"></i> Reporte PDF</button>
                </div>
            </div>

            <!-- KPIs -->
            <div class="row g-4 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="kpi-info">
                            <p id="kpi-1-label">Indicador 1</p>
                            <h3 id="kpi-1-val">$124,500</h3>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fas fa-users"></i></div>
                        <div class="kpi-info">
                            <p id="kpi-2-label">Indicador 2</p>
                            <h3 id="kpi-2-val">428</h3>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fas fa-clipboard-check"></i></div>
                        <div class="kpi-info">
                            <p id="kpi-3-label">Indicador 3</p>
                            <h3 id="kpi-3-val">1,204</h3>
                        </div>
                    </div>
                </div>
                <div class="col-xl-3 col-md-6">
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i></div>
                        <div class="kpi-info">
                            <p id="kpi-4-label">Indicador 4</p>
                            <h3 id="kpi-4-val">3</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Charts & Data -->
            <div class="row">
                <div class="col-lg-12">
                    <div class="chart-box">
                        <div class="d-flex justify-content-between align-items-center">
                            <h5 class="fw-bold mb-0" style="font-size: 1.1rem;">Rendimiento del mes</h5>
                            <select class="form-select w-auto form-select-sm border-0 bg-light fw-bold"><option>Noviembre 2026</option></select>
                        </div>
                        <!-- Pure CSS mocked chart -->
                        <div class="chart-mock">
                            <div class="bar" style="height: 30%;"></div>
                            <div class="bar" style="height: 50%;"></div>
                            <div class="bar" style="height: 40%;"></div>
                            <div class="bar" style="height: 80%;"></div>
                            <div class="bar" style="height: 60%;"></div>
                            <div class="bar" style="height: 90%;"></div>
                            <div class="bar" style="height: 75%;"></div>
                            <div class="bar" style="height: 45%;"></div>
                            <div class="bar" style="height: 85%;"></div>
                            <div class="bar" style="height: 100%;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div class="table-box">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0" style="font-size: 1.1rem;" id="table-title">Registros Recientes</h5>
                    <a href="#" class="text-decoration-none fw-bold" style="color: var(--saas-accent); font-size: 0.9rem;">Ver todos ></a>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover border-transparent">
                        <thead id="table-head">
                            <tr>
                                <th>Ref #</th>
                                <th>Entidad</th>
                                <th>Fecha</th>
                                <th>Estado</th>
                                <th class="text-end">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>

        </main>
    </div>

    <script>
        // La magia de adaptación del SaaS Ultra
        const urlParams = new URLSearchParams(window.location.search);
        let industry = urlParams.get('industry') || 'salud';

        const config = {
            salud: { 
                title: 'Arhez Health CRM', 
                icon: 'fa-heartbeat', 
                accent: '#06b6d4',
                kpis: ['Ingresos Diarios', 'Citas Hoy', 'Pacientes Activos', 'Recetas (Semana)'], 
                menu: [
                    { label: 'Panel Médico', icon: 'fa-chart-pie' },
                    { label: 'Agenda / Citas', icon: 'fa-calendar-alt' },
                    { label: 'Expedientes', icon: 'fa-folder-open' },
                    { label: 'Inventario RRHH', icon: 'fa-boxes' },
                    { label: 'Facturación Gráfica', icon: 'fa-file-invoice-dollar' }
                ],
                table: {
                    headers: ['ID Paciente', 'Nombre', 'Última Cita', 'Estado'],
                    rows: [
                        ['PAC-892', 'Carlos Martínez', 'Hoy 10:30 AM', 'Completado'],
                        ['PAC-711', 'Ana López G.', 'Hoy 12:00 PM', 'En Espera'],
                        ['PAC-650', 'Luis Fernando Ruiz', 'Ayer', 'Completado']
                    ]
                }
            },
            alimentos: { 
                title: 'Arhez Food POS', 
                icon: 'fa-utensils', 
                accent: '#f59e0b',
                kpis: ['Ventas Hoy', 'Ticket Promedio', 'Órdenes Activas', 'Alertas Stock'], 
                menu: [
                    { label: 'Cloud POS', icon: 'fa-cash-register' },
                    { label: 'Gestión de Mesas', icon: 'fa-chair' },
                    { label: 'Menú Digital', icon: 'fa-book-open' },
                    { label: 'Inventario Ingredientes', icon: 'fa-box' },
                    { label: 'Reporte Z', icon: 'fa-chart-bar' }
                ],
                table: {
                    headers: ['Comanda #', 'Mesa / Delivery', 'Hora de Orden', 'Estado Cocina'],
                    rows: [
                        ['CMD-091', 'Mesa 4 (Interior)', 'Hace 5 min', 'Preparando'],
                        ['CMD-092', 'UberEats #A98', 'Hace 2 min', 'Recibida'],
                        ['CMD-090', 'Mesa 12 (Terraza)', 'Hace 25 min', 'Entregado']
                    ]
                }
            },
            construccion: { 
                title: 'Arhez Build ERP', 
                icon: 'fa-hard-hat', 
                accent: '#ef4444',
                kpis: ['Presupuesto Total', 'Avance Obra %', 'Fuerza Laboral', 'Alertas Retraso'], 
                menu: [
                    { label: 'Tablero Directivo', icon: 'fa-columns' },
                    { label: 'Gestor Proyectos', icon: 'fa-building' },
                    { label: 'Cotizaciones', icon: 'fa-file-signature' },
                    { label: 'Almacén de Obra', icon: 'fa-warehouse' },
                    { label: 'Proveedores', icon: 'fa-truck' }
                ],
                table: {
                    headers: ['Folio Proyecto', 'Residente Obra', 'Actualización', 'Estatus'],
                    rows: [
                        ['OBR-10A', 'Fase 2 - Residencial El Valle', 'Hoy', 'En Progreso'],
                        ['OBR-14C', 'Cimentación Torre Norte', 'Ayer', 'Retraso Info'],
                        ['OBR-09B', 'Bodega Logística 3', '2 Días', 'Completado']
                    ]
                }
            },
            gimnasio: { 
                title: 'Arhez Fit Manager', 
                icon: 'fa-dumbbell', 
                accent: '#8dee12',
                kpis: ['Ingresos MRR', 'Check-ins Hoy', 'Socios Activos', 'Membresías Vencidas'], 
                menu: [
                    { label: 'Control de Acceso', icon: 'fa-id-card' },
                    { label: 'Socios (CRM)', icon: 'fa-users' },
                    { label: 'Pagos / Suscripción', icon: 'fa-credit-card' },
                    { label: 'Horarios de Clases', icon: 'fa-calendar-week' },
                    { label: 'Staff y Entrenadores', icon: 'fa-user-tie' }
                ],
                table: {
                    headers: ['Socio ID', 'Nombre', 'Último Acceso', 'Membresía'],
                    rows: [
                        ['SOC-1049', 'Miguel Gómez', 'Hoy 07:15 AM', 'Activa (Platinum)'],
                        ['SOC-0899', 'Sara Hernández', 'Ayer 19:30 PM', 'Vence en 3 Días'],
                        ['SOC-1102', 'David O. Perez', 'Hace 5 días', 'Inactiva']
                    ]
                }
            },
            comercial: { 
                title: 'Arhez Retail ERP', 
                icon: 'fa-store', 
                accent: '#8b7355',
                kpis: ['Ventas Netas', 'Órdenes Web', 'Inventario Bajo', 'Devoluciones'], 
                menu: [
                    { label: 'Dashboard B2B', icon: 'fa-chart-area' },
                    { label: 'Catálogo Productos', icon: 'fa-tshirt' },
                    { label: 'Envíos / Guías', icon: 'fa-shipping-fast' },
                    { label: 'Clientes Comerciales', icon: 'fa-address-book' },
                    { label: 'Finanzas', icon: 'fa-wallet' }
                ],
                table: {
                    headers: ['Orden #', 'Cliente', 'Fecha de Venta', 'Estado Entrega'],
                    rows: [
                        ['VTA-4091', 'Boutique Centro SC', 'Hoy 11:22 AM', 'Enviado'],
                        ['VTA-4092', 'Cliente Final (Web)', 'Hoy 09:10 AM', 'Procesando'],
                        ['VTA-4088', 'Distribuidor Norte', 'Ayer', 'Entregado']
                    ]
                }
            },
            manufactura: { 
                title: 'IndusPro ERP Industrial', 
                icon: 'fa-industry', 
                accent: '#F97316',
                kpis: ['Eficiencia OEE', 'Órdenes Activas', 'Mantenimiento Pend.', 'Paro de Línea (hrs)'], 
                menu: [
                    { label: 'Panel de Producción', icon: 'fa-industry' },
                    { label: 'Control de Calidad', icon: 'fa-clipboard-check' },
                    { label: 'Almacén & Suministros', icon: 'fa-boxes' },
                    { label: 'Mantenimiento 4.0', icon: 'fa-tools' },
                    { label: 'Logística de Salida', icon: 'fa-truck-loading' }
                ],
                table: {
                    headers: ['Línea ID', 'Producto en Celda', 'Estado de Turno', 'Nivel de Alerta'],
                    rows: [
                        ['L-01 (Norte)', 'Estructura Aluminio X4', 'Operando', 'Normal'],
                        ['L-03 (Sur)', 'Placa Electrónica V2', 'Paro Técnico', 'Crítico'],
                        ['L-02 (Oeste)', 'Ensamblaje Robótico', 'Mantenimiento', 'Preventivo']
                    ]
                }
            }
        };

        // Fallback for missing or mistyped params
        if(!config[industry]) industry = 'salud';
        const ctx = config[industry];

        // 1. Set Brand and Colors
        document.getElementById('page-title').innerText = ctx.title;
        document.getElementById('brand-title').innerText = ctx.title;
        document.getElementById('brand-icon').className = `fas ${ctx.icon}`;
        document.documentElement.style.setProperty('--saas-accent', ctx.accent);

        // 2. Set Menu
        const menuContainer = document.getElementById('menu-container');
        ctx.menu.forEach((item, index) => {
            const a = document.createElement('a');
            a.href = '#';
            a.className = `menu-item ${index === 0 ? 'active' : ''}`;
            a.innerHTML = `<i class="fas ${item.icon}"></i> ${item.label}`;
            menuContainer.appendChild(a);
        });

        // 3. Set KPIs
        document.getElementById('kpi-1-label').innerText = ctx.kpis[0];
        document.getElementById('kpi-2-label').innerText = ctx.kpis[1];
        document.getElementById('kpi-3-label').innerText = ctx.kpis[2];
        document.getElementById('kpi-4-label').innerText = ctx.kpis[3];

        // 4. Set Table
        const thead = document.getElementById('table-head');
        thead.innerHTML = `<tr>${ctx.table.headers.map(h => `<th>${h}</th>`).join('')}<th class="text-end">Acción</th></tr>`;
        
        const tbody = document.getElementById('table-body');
        ctx.table.rows.forEach((row, i) => {
            // Determine status style naively based on common keywords
            const statusText = row[3];
            let badgeClass = 'status-success'; // default green
            if(statusText.includes('Espera') || statusText.includes('Retraso') || statusText.includes('Procesando') || statusText.includes('Vence') || statusText.includes('Recibida') || statusText.includes('Inactiva')) {
                badgeClass = 'status-warning';
            }
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><span class="fw-bold">${row[0]}</span></td>
                <td>${row[1]}</td>
                <td>${row[2]}</td>
                <td><span class="status-badge ${badgeClass}">${statusText}</span></td>
                <td class="text-end">
                    <button class="btn btn-sm btn-light border"><i class="fas fa-ellipsis-v"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        // 5. Responsive Menu Logic
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('mobile-menu-btn');

        function toggleMenu() {
            sidebar.classList.toggle('show');
            overlay.classList.toggle('show');
        }

        menuBtn.addEventListener('click', toggleMenu);
        overlay.addEventListener('click', toggleMenu);
